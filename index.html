<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>わたしメーター</title>


<link rel="stylesheet" href="style.css">
 
 <!-- Chart.jsはここ -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<link rel="apple-touch-icon" href="icon.png">


<body>
    <div class="container">

  <div class="header">

  <p id="today"></p><br>
<h1>わたしメーター</h1>

 <p>疲れ0〜5で入力してね</p>

<div>


</center>
<div class="row">
  <label>身体の疲れ</label>
 <input type="number" id="body"></div><br>
<div class="row">
 <label>対人関係</label>
 <input type="number" id="stress"></div><br>
<div class="row">
<label>仕事</label>
 <input type="number" id="work"></div><br>
<div class="row">
<label>勉強</label>
 <input type="number" id="study"></div><br>
<div class="row">
  <label>家事育児</label>
 <input type="number" id="child"></div>

</div>

<button onclick="saveToday()">今日を保存する</button>

<p id="savedStatus"></p>

<div id="popup" class="popup">💾 保存したよ！</div>

<h2 id="result"></h2>

<center>
<div class="chart-card" >
  <canvas id="myChart"></canvas>
</div></center>



<script>


    function showPopup() {
  const popup = document.getElementById("popup");
  popup.classList.add("show");

  setTimeout(() => {
    popup.classList.remove("show");
  }, 1500);
}


let myChart = null;

function calcTotal() {

  let total =
    (Number(document.getElementById("body").value) || 0) +
    (Number(document.getElementById("stress").value) || 0) +
    (Number(document.getElementById("work").value) || 0) +
    (Number(document.getElementById("study").value) || 0) +
    (Number(document.getElementById("child").value) || 0) ;
 
  let message = "";
  let result = document.getElementById("result");

  if (total >= 11) {
    message = "🌙 今日は守る日（休もう）";
    result.className = "bad";
  } else if (total >= 6) {
    message = "🌿 調整しながらいこう";
    result.className = "normal";
  } else {
    message = "✨ 動ける日！";
    result.className = "good";
  }

  result.textContent = "合計: " + total + " → " + message;

  // 入力保存
  localStorage.setItem("body", document.getElementById("body").value);
  localStorage.setItem("stress", document.getElementById("stress").value);
  localStorage.setItem("work", document.getElementById("work").value);
  localStorage.setItem("study", document.getElementById("study").value);
  localStorage.setItem("child", document.getElementById("child").value);

  // 日付保存
  let today = new Date().toLocaleDateString();
  let data = JSON.parse(localStorage.getItem("records")) || [];

  let existing = data.find(item => item.date === today);

  if (existing) {
    existing.total = total;
  } else {
    data.push({ date: today, total: total });
  }

  localStorage.setItem("records", JSON.stringify(data));

  drawChart();
}


function saveToday() {
  calcTotal();
  showPopup(); // 今の値を確定保存

  document.getElementById("savedStatus").textContent = "✅ 今日は保存済み";

}

window.onload = function() {

  document.getElementById("body").value = localStorage.getItem("body") || "";
  document.getElementById("stress").value = localStorage.getItem("stress") || "";
  document.getElementById("work").value = localStorage.getItem("work") || "";
  document.getElementById("study").value = localStorage.getItem("study1") || "";
  document.getElementById("child").value = localStorage.getItem("child") || "";

let now = new Date();

let week = ["日","月","火","水","木","金","土"];

let text = 
  now.getFullYear() + "年" +
  (now.getMonth() + 1) + "月" +
  now.getDate() + "日（" +
  week[now.getDay()] + "）";

document.getElementById("today").textContent = text;

let today = new Date().toLocaleDateString();
let data = JSON.parse(localStorage.getItem("records")) || [];

let exists = data.find(item => item.date === today);

if (exists) {
  document.getElementById("savedStatus").textContent = "✅ 今日は保存済み";
} else {
  document.getElementById("savedStatus").textContent = "📝 まだ保存してない";
}



  drawChart();
}

function drawChart() {

  let data = JSON.parse(localStorage.getItem("records")) || [];

  let labels = data.map(item => item.date);
  let totals = data.map(item => item.total);

  let today = new Date().toLocaleDateString();

  // ⭐ 今日だけ色変える
 let pointColors = labels.map(date =>
  date === today ? "#ffd93d" : "#6c6cff"
);

  // ⭐ 今日だけサイズ変える（任意）
  let pointSizes = labels.map(date =>
    date === today ? 8 : 5
  );

  if (myChart) {
    myChart.destroy();
  }

  myChart = new Chart(document.getElementById("myChart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        data: totals,
        borderColor: "#6c6cff",
        backgroundColor: "rgba(108,108,255,0.1)",
        tension: 0.4,
        fill: true,

        pointRadius: pointSizes, // ←ここ
        pointHoverRadius: 8,
        pointBackgroundColor: pointColors // ←ここ
      }]
    },
    options: {
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
}

</script>



</div>
</body>
</html>
